volumes:
  postgres-data:
  chroma-data:
  gradle-cache:

services:
  app:
    container_name: javadev
    build:
      context: ..                          # Project root, so Dockerfile can COPY build files
      dockerfile: .devcontainer/Dockerfile
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOSTNAME: db
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    volumes:
      - ../..:/workspaces:cached
      - gradle-cache:/root/.gradle        # Persists Gradle cache within the same codespace
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_healthy
    networks:
      - app-network

  db:
    container_name: postgresdb
    image: postgres:latest
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data    # Fixed: was missing /data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

  chroma:
    container_name: chromadb
    image: chromadb/chroma:latest
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - chroma-data:/chroma/chroma

networks:
  app-network:
    driver: bridge

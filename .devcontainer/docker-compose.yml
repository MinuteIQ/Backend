volumes:
  postgres-data:
  chroma-data:
  kafka-data:
  gradle-cache:

services:
  app:
    container_name: javadev
    build:
      context: ..                          # Project root, so Dockerfile can COPY build files
      dockerfile: .devcontainer/Dockerfile
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOSTNAME: db
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ../..:/workspaces:cached
      - gradle-cache:/root/.gradle        # Persists Gradle cache within the same codespace
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network

  db:
    container_name: postgresdb
    image: postgres:latest
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data    # Fixed: was missing /data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

  chroma:
    container_name: chromadb
    image: chromadb/chroma:latest
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - chroma-data:/chroma/chroma

  kafka:
    container_name: kafka
    image: bitnami/kafka:latest
    restart: unless-stopped
    networks:
      - app-network
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-data:/bitnami/kafka

networks:
  app-network:
    driver: bridge
